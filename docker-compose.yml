version: "3.9"

services:
  # ─── Infrastructure ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Application Services ───
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      - REDIS_URL=redis://redis:6379
      - CLAUDE_GRPC_ADDR=claude-wrapper:50052
      - BROWSER_GRPC_ADDR=browser-controller:50053
      - TTS_GRPC_ADDR=tts-service:50054
      - PERSISTENCE_GRPC_ADDR=persistence:50055
      - HTTP_PORT=3000
      - GRPC_PORT=50051
      - AGENT_NAME=${AGENT_NAME:-Alex}
      - DEMO_LANGUAGE=${DEMO_LANGUAGE:-en}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - TTS_MODEL=${TTS_MODEL:-eleven_turbo_v2}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - tts-audio:/tmp/zoom-audio
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  zoom-bot:
    build:
      context: .
      dockerfile: services/zoom-bot/Dockerfile
    environment:
      - ZOOM_ACCOUNT_ID=${ZOOM_ACCOUNT_ID}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
      - ZOOM_MEETING_ID=${ZOOM_MEETING_ID}
      - ZOOM_MEETING_PASSWORD=${ZOOM_MEETING_PASSWORD}
      - ORCHESTRATOR_GRPC_ADDR=orchestrator:50051
      - STT_GRPC_ADDR=stt-service:50056
      - TTS_GRPC_ADDR=tts-service:50054
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - AUDIO_INPUT_FILE=${AUDIO_INPUT_FILE}
      - AUDIO_OUTPUT_DIR=/data/audio
      - AUDIO_OUTPUT=${AUDIO_OUTPUT:-file}
      - AUTO_DEMO=${AUTO_DEMO:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DISPLAY=:99
    volumes:
      - audio-data:/data/audio
      - tts-audio:/tmp/zoom-audio
    depends_on:
      - orchestrator
      - stt-service
      - tts-service
    deploy:
      resources:
        limits:
          memory: 1G

  browser-controller:
    build:
      context: .
      dockerfile: services/browser-controller/Dockerfile
    environment:
      - GRPC_PORT=50053
      - BMA_URL=${BMA_URL}
      - BMA_USERNAME=${BMA_USERNAME}
      - BMA_PASSWORD=${BMA_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(50053).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G

  stt-service:
    build:
      context: .
      dockerfile: services/stt-service/Dockerfile
    environment:
      - GRPC_PORT=50056
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-scopio-lab-bpa-demo}
      - STT_LANGUAGE=${STT_LANGUAGE:-en-US}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import grpc; ch=grpc.insecure_channel('localhost:50056'); grpc.channel_ready_future(ch).result(timeout=2)\""]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  tts-service:
    build:
      context: .
      dockerfile: services/tts-service/Dockerfile
    environment:
      - GRPC_PORT=50054
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - TTS_MODEL=${TTS_MODEL:-eleven_turbo_v2}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(50054).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  claude-wrapper:
    build:
      context: .
      dockerfile: services/claude-wrapper/Dockerfile
    environment:
      - GRPC_PORT=50052
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_NAME=${AGENT_NAME:-Alex}
      - DEMO_LANGUAGE=${DEMO_LANGUAGE:-en}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(50052).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  persistence:
    build:
      context: .
      dockerfile: services/persistence/Dockerfile
    environment:
      - GRPC_PORT=50055
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-scopio-lab-bpa-demo}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(50055).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  audio-data:
  tts-audio:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScopioLabs Demo Agent — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0b0f; color: #e0e0e0; height: 100vh; overflow: hidden; }

    .layout { display: grid; grid-template-columns: 380px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

    /* Header */
    header { grid-column: 1 / -1; background: #12141c; border-bottom: 1px solid #1e2030; display: flex; align-items: center; padding: 0 20px; gap: 16px; }
    .logo { font-weight: 700; color: #2563eb; font-size: 15px; }
    .session-info { font-size: 13px; color: #64748b; }
    .session-info .active { color: #4ade80; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }

    /* Sidebar */
    .sidebar { background: #12141c; border-right: 1px solid #1e2030; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* Steps timeline */
    .steps-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 12px; }
    .step-item { display: flex; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: default; font-size: 13px; transition: all 0.2s; }
    .step-item.completed { color: #64748b; }
    .step-item.completed .step-dot { background: #16a34a; }
    .step-item.current { background: #1e293b; color: #f1f5f9; }
    .step-item.current .step-dot { background: #2563eb; box-shadow: 0 0 8px #2563eb88; }
    .step-item.pending { color: #475569; }
    .step-item.pending .step-dot { background: #334155; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .step-topic { flex: 1; }

    /* Controls */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    button { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    button:hover { background: #3b82f6; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary { background: #1e293b; color: #94a3b8; }
    button.secondary:hover { background: #334155; }
    button.danger { background: #dc2626; }

    /* Q&A input */
    .qa-section { margin-top: auto; }
    .qa-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 8px; }
    .qa-input { display: flex; gap: 6px; }
    .qa-input input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e0e0e0; padding: 10px 12px; border-radius: 8px; font-size: 13px; outline: none; }
    .qa-input input:focus { border-color: #2563eb; }
    .qa-input button { padding: 10px 14px; }

    /* Main content — BMA iframe + transcript */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    /* BMA iframe */
    .bma-frame { flex: 1; position: relative; background: #0f1117; }
    .bma-frame iframe { width: 100%; height: 100%; border: none; }
    .bma-frame .overlay { position: absolute; top: 12px; left: 12px; background: #000000cc; padding: 6px 14px; border-radius: 6px; font-size: 12px; color: #94a3b8; pointer-events: none; }

    /* Transcript */
    .transcript { height: 200px; min-height: 120px; background: #12141c; border-top: 1px solid #1e2030; overflow-y: auto; padding: 12px 16px; }
    .transcript h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 8px; position: sticky; top: 0; background: #12141c; padding-bottom: 4px; }
    .msg { padding: 6px 0; font-size: 13px; line-height: 1.5; border-bottom: 1px solid #1e203044; }
    .msg .role { font-weight: 600; margin-right: 6px; }
    .msg .role.agent { color: #2563eb; }
    .msg .role.prospect { color: #f59e0b; }
    .msg .role.system { color: #64748b; font-style: italic; }
    .msg .action-badge { display: inline-block; background: #16a34a22; color: #4ade80; padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }

    /* Script display */
    .script-bar { background: #1a1d27; border-top: 1px solid #1e2030; padding: 10px 16px; font-size: 13px; color: #94a3b8; line-height: 1.5; max-height: 80px; overflow-y: auto; }
    .script-bar .label { color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

    /* Spinner */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-left: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <span class="logo">ScopioLabs Demo Agent</span>
      <span class="session-info" id="session-info">No active session</span>
      <div class="header-actions">
        <button onclick="createSession()" id="btn-start">Start Demo</button>
        <button class="danger" onclick="endSession()" id="btn-end" disabled>End</button>
      </div>
    </header>

    <div class="sidebar">
      <div class="steps-section">
        <h3>Demo Steps</h3>
        <div id="steps-list"></div>
      </div>

      <div class="controls">
        <button onclick="advance()" id="btn-advance" disabled>Advance Step</button>
        <button class="secondary" onclick="autoPlay()" id="btn-auto" disabled>Auto-Play</button>
      </div>

      <div class="qa-section">
        <h3>Ask a Question (as prospect)</h3>
        <div class="qa-input">
          <input type="text" id="qa-input" placeholder="e.g. Is this FDA cleared?" disabled
            onkeydown="if(event.key==='Enter') askQuestion()" />
          <button onclick="askQuestion()" id="btn-ask" disabled>Ask</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="bma-frame">
        <iframe id="bma-iframe" src="about:blank"></iframe>
        <div class="overlay" id="step-overlay">Step 0 — Waiting</div>
      </div>
      <div class="script-bar" id="script-bar">
        <div class="label">Agent Script</div>
        <div id="script-text">Start a demo session to begin.</div>
      </div>
      <div class="transcript">
        <h3>Live Transcript</h3>
        <div id="transcript"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '';  // same origin
    const BMA_URL = '/bma';
    let callId = null;
    let currentStep = 0;
    let autoPlaying = false;

    const STEPS = [
      { topic: 'Intro + agenda', section: 'home' },
      { topic: 'The BMA problem today', section: 'overview' },
      { topic: 'Full-Field imaging at 100x', section: 'scan_viewer' },
      { topic: 'AI differential count', section: 'ndc_panel' },
      { topic: 'M:E ratio + megakaryocyte count', section: 'quantification' },
      { topic: 'Remote access + collaboration', section: 'remote_access' },
      { topic: 'Digital report generation', section: 'report_export' },
      { topic: 'LIS / LIMS integration', section: 'integration' },
      { topic: 'Q&A open floor', section: 'summary' },
      { topic: 'Close + next steps', section: 'home' },
    ];

    const SECTION_TO_HASH = {
      home: 'home', overview: 'overview', scan_viewer: 'scan',
      ndc_panel: 'ndc', quantification: 'quantification',
      remote_access: 'remote', report_export: 'report',
      integration: 'integration', summary: 'summary',
    };

    function $(id) { return document.getElementById(id); }

    function renderSteps() {
      $('steps-list').innerHTML = STEPS.map((s, i) => {
        let cls = i < currentStep ? 'completed' : i === currentStep ? 'current' : 'pending';
        return `<div class="step-item ${cls}"><div class="step-dot"></div><div class="step-topic">${i}. ${s.topic}</div></div>`;
      }).join('');
    }

    function addTranscript(role, text, action) {
      const div = document.createElement('div');
      div.className = 'msg';
      const badge = action ? `<span class="action-badge">${action}</span>` : '';
      div.innerHTML = `<span class="role ${role}">${role}:</span>${text}${badge}`;
      $('transcript').appendChild(div);
      $('transcript').scrollTop = $('transcript').scrollHeight;
    }

    function updateBMA(section) {
      const hash = SECTION_TO_HASH[section] || section;
      $('bma-iframe').src = `/bma#${hash}`;
    }

    function updateUI(data) {
      if (data.step !== undefined) currentStep = data.step;
      renderSteps();
      $('step-overlay').textContent = `Step ${currentStep} — ${data.topic || STEPS[currentStep]?.topic || ''}`;
      if (data.script) $('script-text').textContent = data.script;
      if (data.section) updateBMA(data.section);

      const ended = data.state === 'ended';
      $('btn-advance').disabled = ended || !callId;
      $('btn-auto').disabled = ended || !callId;
      $('qa-input').disabled = ended || !callId;
      $('btn-ask').disabled = ended || !callId;

      if (ended) {
        $('session-info').innerHTML = `Session ended`;
        addTranscript('system', 'Demo completed.', null);
        autoPlaying = false;
        $('btn-auto').textContent = 'Auto-Play';
      }
    }

    async function createSession() {
      $('btn-start').disabled = true;
      $('btn-start').innerHTML = 'Starting<span class="spinner"></span>';
      try {
        const res = await fetch(`${API}/api/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prospect_name: 'Demo Prospect' }),
        });
        const data = await res.json();
        callId = data.call_id;
        currentStep = 0;
        $('session-info').innerHTML = `<span class="active">LIVE</span> &nbsp; ${callId.slice(0, 8)}...`;
        $('btn-end').disabled = false;
        $('transcript').innerHTML = '';

        updateBMA('home');
        renderSteps();
        $('script-text').textContent = data.script || STEPS[0].topic;
        $('step-overlay').textContent = `Step 0 — ${STEPS[0].topic}`;
        $('btn-advance').disabled = false;
        $('btn-auto').disabled = false;
        $('qa-input').disabled = false;
        $('btn-ask').disabled = false;

        addTranscript('system', `Session started. Prospect: Demo Prospect`, null);
      } catch (err) {
        addTranscript('system', `Error: ${err.message}`, null);
      }
      $('btn-start').disabled = false;
      $('btn-start').textContent = 'Start Demo';
    }

    async function advance() {
      if (!callId) return;
      $('btn-advance').disabled = true;
      $('btn-advance').innerHTML = 'Advancing<span class="spinner"></span>';
      try {
        const res = await fetch(`${API}/api/sessions/${callId}/advance`, { method: 'POST' });
        const data = await res.json();
        addTranscript('agent', data.script || `Navigated to: ${data.topic}`, `STEP ${data.step}`);
        updateUI(data);
      } catch (err) {
        addTranscript('system', `Error: ${err.message}`, null);
      }
      $('btn-advance').textContent = 'Advance Step';
      $('btn-advance').disabled = false;
    }

    async function askQuestion() {
      const input = $('qa-input');
      const question = input.value.trim();
      if (!question || !callId) return;

      input.value = '';
      $('btn-ask').disabled = true;
      $('btn-ask').innerHTML = '<span class="spinner"></span>';
      addTranscript('prospect', question, null);

      try {
        const res = await fetch(`${API}/api/sessions/${callId}/question`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (data.error) {
          addTranscript('system', data.error, null);
        } else {
          addTranscript('agent', data.response_text, data.action);
          updateUI(data);
        }
      } catch (err) {
        addTranscript('system', `Error: ${err.message}`, null);
      }
      $('btn-ask').textContent = 'Ask';
      $('btn-ask').disabled = false;
      input.focus();
    }

    async function autoPlay() {
      if (autoPlaying) {
        autoPlaying = false;
        $('btn-auto').textContent = 'Auto-Play';
        return;
      }
      autoPlaying = true;
      $('btn-auto').textContent = 'Stop';

      while (autoPlaying && callId) {
        await advance();
        if (!autoPlaying) break;
        // Wait proportional to step duration
        const step = STEPS[currentStep];
        if (!step) break;
        await new Promise(r => setTimeout(r, 3000));
      }
      autoPlaying = false;
      $('btn-auto').textContent = 'Auto-Play';
    }

    async function endSession() {
      if (!callId) return;
      await fetch(`${API}/api/sessions/${callId}/end`, { method: 'POST' });
      updateUI({ state: 'ended', step: currentStep, topic: 'Ended' });
      callId = null;
      $('btn-end').disabled = true;
    }

    renderSteps();
  </script>
</body>
</html>

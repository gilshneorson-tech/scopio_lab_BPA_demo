syntax = "proto3";

package scopio.stt;

service STT {
  // Bidirectional streaming: send audio chunks, receive transcriptions
  rpc StreamAudio(stream AudioChunk) returns (stream Transcription);
}

message AudioChunk {
  string call_id = 1;
  bytes audio_data = 2;
  int32 sample_rate = 3;
  string encoding = 4;  // LINEAR16, MULAW, etc.
}

message Transcription {
  string call_id = 1;
  string text = 2;
  bool is_final = 3;
  double confidence = 4;
  int64 timestamp_ms = 5;
}

syntax = "proto3";

package scopio.claude;

service ClaudeWrapper {
  // Send context + transcript, receive agent decision
  rpc Decide(DecideRequest) returns (DecideResponse);
}

message DecideRequest {
  string call_id = 1;
  int32 current_step = 2;
  string step_description = 3;
  repeated Exchange conversation_history = 4;
  string prospect_transcript = 5;
}

message Exchange {
  string role = 1;   // "prospect" or "agent"
  string text = 2;
  int64 timestamp_ms = 3;
}

message DecideResponse {
  string call_id = 1;
  string action = 2;          // ADVANCE, ANSWER, REPEAT, CLOSE
  string response_text = 3;   // What the agent should say
  string reasoning = 4;       // Internal reasoning (for logging)
}
